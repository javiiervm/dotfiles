# --- FONDO ---
background {
    monitor =
    path = ~/.cache/hyprlock/current_wallpaper.png
    blur_passes = 3
    blur_size = 8
    brightness = 0.7
}

# --- CONFIGURACIÓN GENERAL ---
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

# --- CÍRCULOS DECORATIVOS (Fondo) ---
shape {
    monitor =
    size = 700, 700
    color = rgba(0, 0, 0, 0.05)
    rounding = -1
    border_size = 1
    border_color = rgba(255, 255, 255, 0.05)
    position = 0, 50
    halign = center
    valign = center
}

shape {
    monitor =
    size = 1300, 1300
    color = rgba(0, 0, 0, 0.05)
    rounding = -1
    border_size = 1
    border_color = rgba(255, 255, 255, 0.03)
    position = 0, 50
    halign = center
    valign = center
}

# --- RELOJ ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(235, 240, 235, 1)
    font_size = 130
    font_family = JetBrains Mono Nerd Font ExtraBold
    position = 0, 100
    halign = center
    valign = center
}

# --- FECHA ---
label {
    monitor =
    text = cmd[update:5000] LC_ALL=C date +"%A, %B %d"
    color = rgba(235, 240, 235, 0.8)
    font_size = 18
    font_family = JetBrains Mono Nerd Font
    position = 0, -30
    halign = center
    valign = center
}

# --- CAJA DE CONTRASEÑA (Invisible hasta que escribes) ---
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 0
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0.2)
    font_color = rgb(255, 255, 255)
    
    fade_on_empty = true
    placeholder_text = 
    hide_input = false
    rounding = 25
    
    position = 0, -120 
    halign = center
    valign = center
}

# --- BATERÍA (Texto e Icono sin fondo) ---
label {
    monitor =
    text = cmd[update:5000] stat=$(cat /sys/class/power_supply/BAT0/status); cap=$(cat /sys/class/power_supply/BAT0/capacity); if [ "$stat" = "Charging" ]; then echo "  $cap%"; else echo "  $cap%"; fi
    color = rgba(235, 240, 235, 0.9)
    font_size = 26
    font_family = JetBrains Mono Nerd Font ExtraBold
    position = 0, 45
    halign = center
    valign = bottom
}
