# --- FONDO ---
background {
    monitor =
    path = ~/.cache/hyprlock/current_wallpaper.png
    blur_passes = 3
    blur_size = 8
    brightness = 0.7
}

# --- CONFIGURACIÓN GENERAL ---
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

# --- FECHA (En Inglés: Thursday, April 16) ---
label {
    monitor =
    #text = cmd[update:43200000] echo "$(LANG=en_US.UTF-8 date +"%A, %B %d")"
	text = cmd[update:5000] LC_ALL=C date +"%A, %B %d "
    color = rgba(250, 250, 250, 0.8)
    font_size = 30
    font_family = JetBrains Mono Nerd Font
    position = 0, -100
    halign = center
    valign = top
}

# --- RELOJ ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(250, 250, 250, 1)
    font_size = 120
    font_family = JetBrains Mono Nerd Font ExtraBold
    position = 0, -160
    halign = center
    valign = top
}

# --- LOGO DE PERFIL (Encima del password) ---
image {
    monitor =
    path = ~/.face # <-- Pon aquí la ruta a tu imagen sane o similar
    size = 100
    rounding = -1
    border_size = 2
    border_color = rgba(255, 255, 255, 0.1)
    position = 0, -220 # Bajado para estar cerca del password
    halign = center
    valign = center
}

# --- CAJA DE CONTRASEÑA (Más abajo) ---
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 0
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    
    outer_color = rgba(255, 255, 255, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(255, 255, 255)
    
    fade_on_empty = false
    placeholder_text = <span foreground="##ffffff99">Enter Password</span>
    hide_input = false
    rounding = 25
    
    # Posición mucho más baja para limpiar el centro de la pantalla
    position = 0, -320 
    halign = center
    valign = center
}
